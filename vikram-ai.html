<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>VIKRAM AI</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00d4ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color: #00d4ff;
      --bg: #050810;
    }

    body {
      background: var(--bg);
      color: #e0e8ff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* HEADER */
    #header {
      padding: 14px 16px 0;
      border-bottom: 1px solid #ffffff12;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    #title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    #logo {
      width: 34px; height: 34px; border-radius: 8px;
      background: linear-gradient(135deg, #00d4ff44, #00d4ff11);
      border: 1px solid #00d4ff66;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 14px #00d4ff44;
      flex-shrink: 0;
    }

    #title-text { font-size: 17px; font-weight: 700; letter-spacing: 3px; color: var(--color); text-shadow: 0 0 20px var(--color); }
    #title-sub { font-size: 9px; color: #4a5580; letter-spacing: 1px; }

    #online-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    #online-label { font-size: 10px; color: #00ff88; letter-spacing: 1px; }

    #listening-banner {
      display: none;
      margin-bottom: 8px;
      padding: 6px 12px;
      background: #ff000018;
      border: 1px solid #ff4444;
      border-radius: 8px;
      font-size: 11px;
      color: #ff7777;
      align-items: center;
      gap: 8px;
    }
    #listening-banner.active { display: flex; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4444; animation: ping 0.8s infinite; flex-shrink: 0; }

    /* TABS */
    #tabs {
      display: flex;
      gap: 3px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 7px 12px;
      background: transparent;
      border: 1px solid #1a1f35;
      border-bottom: 2px solid transparent;
      border-radius: 6px 6px 0 0;
      color: #4a5580;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 1px;
      white-space: nowrap;
      transition: all 0.2s;
      font-family: inherit;
    }
    .tab.active {
      border-color: var(--color);
      border-bottom-color: var(--color);
      color: var(--color);
      background: color-mix(in srgb, var(--color) 10%, transparent);
    }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 10;
    }

    #empty-state {
      text-align: center;
      padding-top: 30px;
    }
    #empty-icon { font-size: 44px; margin-bottom: 10px; }
    #empty-title { font-size: 13px; letter-spacing: 2px; color: var(--color); margin-bottom: 4px; }
    #empty-sub { font-size: 11px; color: #4a5580; margin-bottom: 4px; }
    #empty-voice { font-size: 10px; color: #2a3050; margin-bottom: 22px; }

    #suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion {
      padding: 7px 13px;
      background: transparent;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      border: 1px solid #ffffff22;
      color: #8899bb;
    }

    .msg-row {
      display: flex;
      gap: 8px;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .msg-avatar {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
      border: 1px solid #ffffff22;
    }

    .msg-content { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
    .msg-row.user .msg-content { align-items: flex-end; }

    .msg-bubble {
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid #1a1f35;
    }
    .msg-row.user .msg-bubble {
      border-radius: 16px 4px 16px 16px;
      background: color-mix(in srgb, var(--color) 15%, transparent);
      border-color: color-mix(in srgb, var(--color) 40%, transparent);
      color: var(--color);
    }
    .msg-row.assistant .msg-bubble {
      border-radius: 4px 16px 16px 16px;
      background: #0d1020;
      color: #c0ccee;
    }

    .speak-btn {
      padding: 3px 10px;
      background: transparent;
      border-radius: 12px;
      font-size: 10px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 1px;
      transition: all 0.2s;
      color: #4a5580;
      border: 1px solid #ffffff15;
    }

    /* TYPING INDICATOR */
    #typing {
      display: none;
      gap: 8px;
      align-items: center;
    }
    #typing.active { display: flex; }
    #typing-bubble {
      padding: 10px 14px;
      background: #0d1020;
      border: 1px solid #1a1f35;
      border-radius: 4px 16px 16px 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .dot-row { display: flex; gap: 4px; }
    .bounce { width: 5px; height: 5px; border-radius: 50%; background: var(--color); }
    .bounce:nth-child(1) { animation: bounce 1s 0s infinite; }
    .bounce:nth-child(2) { animation: bounce 1s 0.2s infinite; }
    .bounce:nth-child(3) { animation: bounce 1s 0.4s infinite; }
    #typing-label { font-size: 11px; color: #4a5580; }

    /* INPUT */
    #input-area {
      padding: 12px 16px 18px;
      border-top: 1px solid #ffffff12;
      background: linear-gradient(transparent, var(--bg));
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    #input-box {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: #0a0e1a;
      border: 1px solid color-mix(in srgb, var(--color) 30%, transparent);
      border-radius: 12px;
      padding: 10px 12px;
      transition: all 0.3s;
    }
    #input-box.listening { border-color: #ff4444; }

    #cap-icon { font-size: 15px; flex-shrink: 0; padding-bottom: 2px; }

    #text-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e8ff;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      line-height: 1.5;
      max-height: 100px;
    }
    #text-input::placeholder { color: #2a3050; }

    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid #2a3050;
      background: #1a1f35;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    #mic-btn.listening {
      background: linear-gradient(135deg, #ff4444, #cc0000);
      border-color: #ff4444;
      box-shadow: 0 0 14px #ff444455;
    }
    #send-btn {
      border: none;
      background: #1a1f35;
    }
    #send-btn.active {
      background: linear-gradient(135deg, var(--color), color-mix(in srgb, var(--color) 60%, transparent));
      box-shadow: 0 0 12px color-mix(in srgb, var(--color) 50%, transparent);
    }

    #input-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 9px;
      color: #2a3050;
      letter-spacing: 0.8px;
    }

    /* BG glow */
    #bg-glow {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, color-mix(in srgb, var(--color) 6%, transparent), transparent);
      transition: background 0.5s;
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
    @keyframes ping {
      0% { transform: scale(1); opacity: 1; }
      75%, 100% { transform: scale(2.2); opacity: 0; }
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #1a2040; border-radius: 2px; }
  </style>
</head>
<body>

<div id="bg-glow"></div>

<!-- HEADER -->
<div id="header">
  <div id="title-row">
    <div id="logo">🤖</div>
    <div>
      <div id="title-text">VIKRAM AI</div>
      <div id="title-sub">TANGLISH AGENT • VOICE ENABLED 🎤</div>
    </div>
    <div id="online-dot">
      <div class="dot"></div>
      <span id="online-label">ONLINE</span>
    </div>
  </div>
  <div id="listening-banner">
    <div class="rec-dot"></div>
    🎤 Pesungo da... listening!
  </div>
  <div id="tabs"></div>
</div>

<!-- MESSAGES -->
<div id="messages">
  <div id="empty-state">
    <div id="empty-icon">🔍</div>
    <div id="empty-title">AGENT READY DA!</div>
    <div id="empty-sub">Tanglish la pesuvom! 🗣️ Voice la kooda kelukalam!</div>
    <div id="empty-voice">🎤 Mic button press panni paesu — Tanglish la kelu!</div>
    <div id="suggestions"></div>
  </div>
  <div id="typing">
    <div class="msg-avatar" style="background:#ffffff0a;">💬</div>
    <div id="typing-bubble">
      <div class="dot-row">
        <div class="bounce"></div>
        <div class="bounce"></div>
        <div class="bounce"></div>
      </div>
      <span id="typing-label">Yosikurom... 🤔</span>
    </div>
  </div>
</div>

<!-- INPUT -->
<div id="input-area">
  <div id="input-box">
    <span id="cap-icon">🔍</span>
    <textarea id="text-input" rows="1" placeholder="Tanglish la type pannu (or) mic press pannu..."></textarea>
    <button class="icon-btn" id="mic-btn" title="Voice input">🎤</button>
    <button class="icon-btn" id="send-btn" title="Send">➤</button>
  </div>
  <div id="input-footer">
    <span>🎤 Voice • 🔊 Text-to-Speech • 🗣 Tanglish Mode</span>
    <span>VIKRAM AI v2.0</span>
  </div>
</div>

<script>
const CAPS = [
  {
    id: "web_search", icon: "🔍", label: "Web Search", color: "#00d4ff",
    prompt: q => `You are VIKRAM AI — a web search agent who speaks in Tanglish (Tamil+English mixed naturally like Chennai people). User searched: "${q}". Simulate 3 realistic web search results with titles, snippets, URLs. Respond FULLY in Tanglish. Use words like 'machan', 'da', 'paarunga', 'nalla results kedachiruchu'. Be casual and friendly. Use emojis.`
  },
  {
    id: "email", icon: "📧", label: "Email / Schedule", color: "#ff6b6b",
    prompt: q => `You are VIKRAM AI — email and scheduling assistant who speaks Tanglish. User request: "${q}". First explain in Tanglish what you're doing (e.g. "Seri da, draft panni tharein..."), then write the professional email in English, then explain next steps in Tanglish. Be warm like a Tamil friend.`
  },
  {
    id: "code", icon: "💻", label: "Code Gen", color: "#a8ff78",
    prompt: q => `You are VIKRAM AI — Python coding assistant who explains in Tanglish. User wants: "${q}". Explain in Tanglish first ("Ada ponga, itha build pannuvom..."), write clean Python code with Tanglish comments, then explain how it works in Tanglish. Sound like enthusiastic Tamil coder friend!`
  },
  {
    id: "file", icon: "📁", label: "File Handling", color: "#f7971e",
    prompt: q => `You are VIKRAM AI — file handling expert who speaks Tanglish. User request: "${q}". Respond in Tanglish. Explain approach ("Illa da, idha use pannuvom..."), write Python code with Tanglish comments, give tips in Tanglish. Be helpful like a Tamil tech friend!`
  }
];

const SUGGESTED = [
  { cap: "web_search", text: "Latest AI news today sollu" },
  { cap: "email",      text: "Naalaikku 3pm meeting email draft panu" },
  { cap: "code",       text: "Python la web scraper build panni kodu" },
  { cap: "file",       text: "PDF file read panni summary kodu" }
];

let activeCap = "web_search";
let isListening = false;
let isSpeaking = false;
let speakingId = null;
let recognition = null;
const synth = window.speechSynthesis;
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

// ---- Build Tabs ----
const tabsEl = document.getElementById("tabs");
CAPS.forEach(c => {
  const btn = document.createElement("button");
  btn.className = "tab" + (c.id === activeCap ? " active" : "");
  btn.id = "tab-" + c.id;
  btn.textContent = c.icon + " " + c.label;
  btn.onclick = () => switchCap(c.id);
  tabsEl.appendChild(btn);
});

// ---- Build Suggestions ----
const sugEl = document.getElementById("suggestions");
SUGGESTED.forEach(s => {
  const c = CAPS.find(x => x.id === s.cap);
  const btn = document.createElement("button");
  btn.className = "suggestion";
  btn.textContent = c.icon + " " + s.text;
  btn.style.borderColor = c.color + "44";
  btn.style.color = c.color;
  btn.onclick = () => { switchCap(s.cap); document.getElementById("text-input").value = s.text; updateSendBtn(); };
  sugEl.appendChild(btn);
});

function switchCap(id) {
  activeCap = id;
  const c = CAPS.find(x => x.id === id);
  document.documentElement.style.setProperty("--color", c.color);
  document.getElementById("cap-icon").textContent = c.icon;
  document.getElementById("empty-icon").textContent = c.icon;
  document.getElementById("empty-title").textContent = c.label.toUpperCase() + " READY DA!";
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + id).classList.add("active");
}

// ---- Voice Input ----
document.getElementById("mic-btn").onclick = toggleMic;

function toggleMic() {
  if (!SpeechRec) { alert("Ungal browser-la voice support illa da 😢 Chrome use pannu!"); return; }
  if (isListening) { recognition && recognition.stop(); return; }

  recognition = new SpeechRec();
  recognition.lang = "en-IN";
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById("mic-btn").classList.add("listening");
    document.getElementById("listening-banner").classList.add("active");
    document.getElementById("input-box").classList.add("listening");
    document.getElementById("text-input").placeholder = "🎤 Pesungo...";
  };
  recognition.onend = () => {
    isListening = false;
    document.getElementById("mic-btn").classList.remove("listening");
    document.getElementById("listening-banner").classList.remove("active");
    document.getElementById("input-box").classList.remove("listening");
    document.getElementById("text-input").placeholder = "Tanglish la type pannu (or) mic press pannu...";
    updateSendBtn();
  };
  recognition.onresult = e => {
    const t = Array.from(e.results).map(r => r[0].transcript).join("");
    document.getElementById("text-input").value = t;
    updateSendBtn();
  };
  recognition.onerror = () => { isListening = false; };
  recognition.start();
}

// ---- Send ----
document.getElementById("send-btn").onclick = sendMessage;
document.getElementById("text-input").addEventListener("input", updateSendBtn);
document.getElementById("text-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function updateSendBtn() {
  const val = document.getElementById("text-input").value.trim();
  document.getElementById("send-btn").classList.toggle("active", val.length > 0);
}

async function sendMessage() {
  const inp = document.getElementById("text-input");
  const text = inp.value.trim();
  if (!text) return;

  const cap = CAPS.find(c => c.id === activeCap);

  // Hide empty state
  document.getElementById("empty-state").style.display = "none";

  // Add user message
  addMessage("user", text, cap);
  inp.value = "";
  updateSendBtn();

  // Show typing
  const typing = document.getElementById("typing");
  typing.classList.add("active");
  scrollToBottom();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: "You are VIKRAM AI — a powerful Tamil AI agent. ALWAYS respond in Tanglish (natural Tamil+English mix like Chennai/Tamil Nadu people speak). Be like a smart Tamil friend — casual, warm, use 'machan', 'da', 'bro', 'seri', 'illa', 'nalla', 'super', 'romba', 'konjam' naturally. Use emojis. Never pure English or pure Tamil — always mix naturally.",
        messages: [{ role: "user", content: cap.prompt(text) }]
      })
    });
    const data = await res.json();
    const reply = data.content?.map(b => b.text || "").join("") || "Error da!";
    typing.classList.remove("active");
    addMessage("assistant", reply, cap);
  } catch(e) {
    typing.classList.remove("active");
    addMessage("assistant", "⚠️ Ayyo! Connection error da. Vera try pannu!", cap);
  }
}

function addMessage(role, text, cap) {
  const messages = document.getElementById("messages");
  const typing = document.getElementById("typing");
  const id = "msg-" + Date.now();

  const row = document.createElement("div");
  row.className = "msg-row " + role;

  if (role === "assistant") {
    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.style.background = cap.color + "22";
    avatar.style.borderColor = cap.color + "44";
    avatar.textContent = cap.icon;
    row.appendChild(avatar);
  }

  const content = document.createElement("div");
  content.className = "msg-content";

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.textContent = text;
  content.appendChild(bubble);

  if (role === "assistant") {
    const speakBtn = document.createElement("button");
    speakBtn.className = "speak-btn";
    speakBtn.id = "speak-" + id;
    speakBtn.style.borderColor = cap.color + "33";
    speakBtn.textContent = "🔊 KELU";
    speakBtn.onclick = () => toggleSpeak(text, id, cap.color, speakBtn);
    content.appendChild(speakBtn);
  }

  row.appendChild(content);
  messages.insertBefore(row, typing);
  scrollToBottom();
}

function toggleSpeak(text, id, color, btn) {
  if (isSpeaking && speakingId === id) {
    synth.cancel();
    isSpeaking = false; speakingId = null;
    btn.textContent = "🔊 KELU";
    btn.style.color = "#4a5580";
    return;
  }
  if (isSpeaking) { synth.cancel(); }

  const clean = text.replace(/[^\w\s.,!?()-]/g, " ").replace(/\s+/g, " ").trim();
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang = "en-IN"; utt.rate = 0.9; utt.pitch = 1.1;
  const voices = synth.getVoices();
  const v = voices.find(v => v.lang === "en-IN") || voices.find(v => v.lang.includes("en")) || voices[0];
  if (v) utt.voice = v;

  utt.onstart = () => { isSpeaking = true; speakingId = id; btn.textContent = "⏹ NIRUTHU"; btn.style.color = color; };
  utt.onend = utt.onerror = () => { isSpeaking = false; speakingId = null; btn.textContent = "🔊 KELU"; btn.style.color = "#4a5580"; };
  synth.speak(utt);
}

function scrollToBottom() {
  setTimeout(() => {
    const m = document.getElementById("messages");
    m.scrollTop = m.scrollHeight;
  }, 50);
}
</script>
</body>
</html>
